[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Trigger releases via workflow_dispatch instead of tag push. The tag is
# created implicitly when the GitHub Release is published at the end, so no
# workflow ever pushes a tag — which lets release-on-bump.yml dispatch
# releases with the default GITHUB_TOKEN (workflow_dispatch is exempt from
# GitHub's "GITHUB_TOKEN events don't trigger workflows" rule; tag pushes are
# not). No PAT or extra secret required.
dispatch-releases = true
