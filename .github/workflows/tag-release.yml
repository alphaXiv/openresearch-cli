# Mirrors Cargo.toml's version into a git tag.
#
# On every push to main: read the package version; if no `v<version>` tag
# exists yet, create one on this commit and push it — which triggers the
# cargo-dist release workflow (release.yml). If the tag already exists, do
# nothing. This never increments a version: the version is always a human
# decision made in a reviewed PR, and "merge a PR that bumps Cargo.toml" is
# the release act.
#
# IMPORTANT: the tag must be pushed with a personal access token or app
# token (secret RELEASE_TAG_TOKEN, fine-grained PAT with contents:read/write
# on this repo). Tags pushed with the default GITHUB_TOKEN do NOT trigger
# other workflows (GitHub's anti-recursion rule), so release.yml would never
# fire. This job fails loudly, before tagging, when the secret is missing.

name: Tag release

on:
  push:
    branches: [main]

# Serialize runs so two quick merges can't race on tag creation.
concurrency:
  group: tag-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: tag if Cargo.toml version is unreleased
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TAG_TOKEN || github.token }}

      - name: Create and push the tag
        env:
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN != '' }}
        run: |
          set -euo pipefail

          # The package version line ([package] comes first; dependency
          # `version` keys never start a line with `version = `).
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          tag="v${version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — nothing to release."
            echo "(If you meant to cut a release, bump the version in Cargo.toml.)"
            exit 0
          fi

          if [ "${HAS_RELEASE_TOKEN}" != "true" ]; then
            echo "::error::Cargo.toml says ${version} (unreleased) but the RELEASE_TAG_TOKEN secret is not set."
            echo "::error::Refusing to tag with GITHUB_TOKEN: the resulting tag would NOT trigger release.yml."
            echo "::error::Create a fine-grained PAT (contents: read/write on this repo) and save it as the RELEASE_TAG_TOKEN secret, then re-run this workflow."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${version}"
          git push origin "refs/tags/${tag}"
          echo "Tagged ${tag} on $(git rev-parse --short HEAD) — release workflow starting."
